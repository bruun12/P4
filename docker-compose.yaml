services:
  app:
    build: 
      context: .
      dockerfile: Dockerfile
      target: production  
    volumes:
      - .:/app
    environment:
      - PYTHONPATH=/app
    working_dir: /app
    command: python src/main.py

  test:
    build:
      context: .
      dockerfile: Dockerfile
      target: test
    volumes:
      - .:/app
    environment:
      - PYTHONPATH=/app
    working_dir: /app
    command: pytest tests/ -v